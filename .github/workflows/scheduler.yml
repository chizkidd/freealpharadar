# Scheduled data refresh for FreeAlphaRadar.
#
# Runs the batch scorer on a cron schedule to keep the SQLite cache warm, then
# commits the refreshed cache + score snapshots back to the repo so a hosted
# Streamlit app reads pre-computed data. No secrets/API keys are required —
# every data source is free and key-less.
name: Daily Data Refresh & Re-Score # Refresh data & re-score

on:
  schedule:
    # Every day at 06:00 UTC. Adjust as you like.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh data & export prewarm snapshot
        # Fetches live data for the default universe and writes the warmed
        # cache to data/prewarm_cache.json. Skips heavy ML (FinBERT/XGBoost):
        # the app recomputes enrichment from these raw payloads on load.
        run: python run_scorer.py --no-ml --export-snapshot

      - name: Commit prewarm snapshot
        # Pushing to the deploy branch triggers a Streamlit Cloud redeploy,
        # which seeds the cache from this snapshot so visitors see live data
        # with no refresh wait. [skip ci] avoids re-triggering workflows.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # The snapshot may legitimately be absent when the quality gate skips
          # a thin run, so tolerate a missing file rather than failing the job.
          git add data/prewarm_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: scheduled prewarm cache refresh [skip ci]"
            git push
          fi
